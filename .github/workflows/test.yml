# ABOUTME: Runs the bash test suites (macOS + Linux) and the Rust TUI tests on push/PR
# ABOUTME: The release workflow only builds binaries; this is the gate that runs tests

name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run bash test suites
        run: bash tests/run_all.sh

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Run TUI tests
        run: cargo test --manifest-path tui/Cargo.toml
