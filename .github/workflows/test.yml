# ABOUTME: Runs the bash test suites (macOS + Linux) and the Rust TUI tests on push/PR
# ABOUTME: The release workflow only builds binaries; this is the gate that runs tests

name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Bare runners have no global git identity; cs creates commits when it
      # initializes a session, so the session-lifecycle suites need one.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@claude-sessions.test"
          git config --global user.name "cs CI"

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run bash test suites
        run: bash tests/run_all.sh

  build-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify bin/cs is in sync with lib/
        run: |
          bash build.sh
          git diff --exit-code bin/cs \
            || { echo "::error::bin/cs is out of sync with lib/. Run ./build.sh and commit bin/cs."; exit 1; }

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Run TUI tests
        run: cargo test --manifest-path tui/Cargo.toml

  # Git Bash / MSYS2 lane: session management and secrets run here, but launch
  # and the tmux spawner do not (Tier 2), so those tests skip via _skip_on_msys.
  # Informational (continue-on-error) until the full per-test skip-set is
  # calibrated against a real runner — see docs/windows-manual-smoke.md.
  test-windows-msys:
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Configure git identity
        run: |
          git config --global user.email "ci@claude-sessions.test"
          git config --global user.name "cs CI"

      - name: Run bash test suites
        run: bash tests/run_all.sh
