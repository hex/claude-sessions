# ABOUTME: Runs the bash test suites (macOS + Linux) and the Rust TUI tests on push/PR
# ABOUTME: The release workflow only builds binaries; this is the gate that runs tests

name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Bare runners have no global git identity; cs creates commits when it
      # initializes a session, so the session-lifecycle suites need one.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@claude-sessions.test"
          git config --global user.name "cs CI"

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run bash test suites
        run: bash tests/run_all.sh

  build-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify bin/cs is in sync with lib/
        run: |
          bash build.sh
          git diff --exit-code bin/cs \
            || { echo "::error::bin/cs is out of sync with lib/. Run ./build.sh and commit bin/cs."; exit 1; }

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Run TUI tests
        run: cargo test --manifest-path tui/Cargo.toml

  # Git Bash / MSYS2 lane: session management and secrets run here, but launch
  # and the tmux spawner do not (Tier 2), so those tests skip via _skip_on_msys.
  # Required — see docs/windows-manual-smoke.md for what stays manual and how to
  # triage a failure that only this lane sees.
  test-windows-msys:
    runs-on: windows-latest
    # Git Bash on Windows has no native fork(), so each process spawn is
    # emulated at ~10-50x the cost of Linux/macOS. The suite is spawn-heavy, so
    # this lane dominates wall-clock. Shard it across parallel runners; each
    # shard runs a round-robin slice of the suites (see tests/run_all.sh).
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Configure git identity
        run: |
          git config --global user.email "ci@claude-sessions.test"
          git config --global user.name "cs CI"

      - name: Run bash test suites (shard ${{ matrix.shard }}/4)
        run: bash tests/run_all.sh
        env:
          CS_TEST_SHARD: ${{ matrix.shard }}/4
