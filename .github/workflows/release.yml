# ABOUTME: Builds cs-tui for macOS (arm64, amd64) and Linux (amd64) on version tags
# ABOUTME: Creates a GitHub Release with pre-built binaries for each platform

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - platform: darwin-amd64
            runner: macos-15-large
            target: x86_64-apple-darwin
            ext: ""
          - platform: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""
          - platform: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: contains(matrix.platform, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Gate the Windows artifact on the TUI behaving on Windows (Task 13):
      # a broken kill/security path fails here and no cs-tui.exe is published.
      - name: Test cs-tui (Windows gate)
        if: contains(matrix.platform, 'windows')
        run: cargo test --manifest-path tui/Cargo.toml --target ${{ matrix.target }}

      - name: Build cs-tui
        run: cargo build --release --manifest-path tui/Cargo.toml --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp "tui/target/${{ matrix.target }}/release/cs-tui${{ matrix.ext }}" "cs-tui-${{ matrix.platform }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v6
        with:
          name: cs-tui-${{ matrix.platform }}
          path: cs-tui-${{ matrix.platform }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Install minisign
        run: |
          curl -fsSL https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz | tar xz
          sudo mv minisign-linux/x86_64/minisign /usr/local/bin/

      - name: Sign release assets
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          echo "$MINISIGN_KEY" > /tmp/minisign.key

          minisign -Sm install.sh -s /tmp/minisign.key -t "cs ${GITHUB_REF_NAME}" -W
          for bin in cs-tui-*; do
            minisign -Sm "$bin" -s /tmp/minisign.key -t "cs ${GITHUB_REF_NAME}" -W
          done

          rm -f /tmp/minisign.key

      - name: Generate checksums
        run: |
          sha256sum install.sh > install.sh.sha256
          for bin in cs-tui-*; do
            [[ "$bin" == *.minisig ]] && continue
            sha256sum "$bin" > "${bin}.sha256"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            install.sh
            install.sh.minisig
            install.sh.sha256
            cs-tui-*
          generate_release_notes: true
