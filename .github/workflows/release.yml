# ABOUTME: Builds cs-tui for macOS (arm64, amd64) and Linux (amd64) on version tags
# ABOUTME: Creates a GitHub Release with pre-built binaries for each platform

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - platform: darwin-amd64
            runner: macos-13
            target: x86_64-apple-darwin
          - platform: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux only)
        if: contains(matrix.platform, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build cs-tui
        run: cargo build --release --manifest-path tui/Cargo.toml --target ${{ matrix.target }}

      - name: Rename binary
        run: cp tui/target/${{ matrix.target }}/release/cs-tui cs-tui-${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: cs-tui-${{ matrix.platform }}
          path: cs-tui-${{ matrix.platform }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: cs-tui-*
          generate_release_notes: true
